apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: chatops
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: {{ .Values.authService.image }}
        imagePullPolicy: {{ .Values.authService.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.authService.port }}
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: chatops-secrets
              key: jwt-secret
        resources:
          requests:
            memory: {{ .Values.resources.requests.memory }}
            cpu: {{ .Values.resources.requests.cpu }}
          limits:
            memory: {{ .Values.resources.limits.memory }}
            cpu: {{ .Values.resources.limits.cpu }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.authService.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.authService.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: chatops
spec:
  selector:
    app: auth-service
  ports:
  - port: {{ .Values.authService.port }}
    targetPort: {{ .Values.authService.port }}
  type: ClusterIP
