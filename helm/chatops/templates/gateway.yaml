apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: chatops
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: {{ .Values.gateway.image }}
        imagePullPolicy: {{ .Values.gateway.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.gateway.port }}
        env:
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:{{ .Values.authService.port }}"
        - name: CHAT_SERVICE_URL
          value: "http://chat-service:{{ .Values.chatService.port }}"
        resources:
          requests:
            memory: {{ .Values.resources.requests.memory }}
            cpu: {{ .Values.resources.requests.cpu }}
          limits:
            memory: {{ .Values.resources.limits.memory }}
            cpu: {{ .Values.resources.limits.cpu }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.gateway.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.gateway.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: chatops
spec:
  selector:
    app: gateway
  ports:
  - port: {{ .Values.gateway.port }}
    targetPort: {{ .Values.gateway.port }}
  type: ClusterIP
